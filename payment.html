<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HumDum - Complete Payment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0F0F1A; height: 100vh; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; max-width: 480px; }
    </style>
</head>
<body>
    <script>
        const params = new URLSearchParams(window.location.search);
        const cfId = params.get('cf_id');
        if (cfId) {
            window.location.href = 'https://checkout.cashfree.com/pg/view/payment/collect?cf_id=' + cfId;
        } else {
            document.body.innerHTML = '<p style="color:white;text-align:center;">Invalid payment link</p>';
        }
    </script>
</body>
</html>
